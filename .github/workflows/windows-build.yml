name: Windows Build

on:
  push:
    branches: [windows-port]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Prepare bundled runtime (node.exe + openclaw + plugins) for win32
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $nodeVer = "22.22.3"

          Write-Host "== 1) bundled node.exe (mandatory) =="
          $url = "https://nodejs.org/dist/v$nodeVer/node-v$nodeVer-win-x64.zip"
          Invoke-WebRequest $url -OutFile node.zip
          Expand-Archive node.zip -DestinationPath nodebin -Force
          New-Item -ItemType Directory -Force -Path src-tauri/bundled/bin | Out-Null
          Copy-Item "nodebin/node-v$nodeVer-win-x64/node.exe" "src-tauri/bundled/bin/node.exe" -Force

          Write-Host "== 2) fresh openclaw@2026.6.9 win32 (mandatory) =="
          New-Item -ItemType Directory -Force -Path oc | Out-Null
          Push-Location oc
          npm init -y | Out-Null
          npm install openclaw@2026.6.9 --omit=dev --no-audit --no-fund
          if ($LASTEXITCODE -ne 0) { throw "npm install openclaw failed" }
          Pop-Location
          New-Item -ItemType Directory -Force -Path src-tauri/bundled/lib | Out-Null
          if (Test-Path src-tauri/bundled/lib/node_modules) { Remove-Item -Recurse -Force src-tauri/bundled/lib/node_modules }
          Copy-Item -Recurse -Force oc/node_modules src-tauri/bundled/lib/node_modules

          Write-Host "== 3) npm 插件: stepfun + 微信 (win32 全新装) =="
          $node = "$PWD/src-tauri/bundled/bin/node.exe"
          $oc = "$PWD/src-tauri/bundled/lib/node_modules/openclaw/openclaw.mjs"
          $env:OPENCLAW_STATE_DIR = "$PWD/ocstate"
          foreach ($spec in @("@openclaw/stepfun-provider","@tencent-weixin/openclaw-weixin@2.4.3")) {
            Write-Host "-- plugins install $spec"
            & $node $oc plugins install $spec 2>&1 | Write-Host
          }
          foreach ($id in @("stepfun","openclaw-weixin")) {
            & $node $oc plugins enable $id 2>&1 | Write-Host
          }
          if (Test-Path "$env:OPENCLAW_STATE_DIR/npm/projects") {
            New-Item -ItemType Directory -Force -Path src-tauri/bundled/npm/projects | Out-Null
            Copy-Item -Recurse -Force "$env:OPENCLAW_STATE_DIR/npm/projects/*" src-tauri/bundled/npm/projects/
          }

          Write-Host "== 4) 飞书插件: 用 Release 上托管的 2026.6.9 纯 JS 版(绕开 clawhub 版本墙) =="
          gh release download vendor-feishu-2026.6.9 -p "feishu-2026.6.9.tar.gz" -O feishu.tar.gz
          if ($LASTEXITCODE -ne 0) { Write-Host "feishu vendor download failed (非致命)" }
          if (Test-Path feishu.tar.gz) {
            New-Item -ItemType Directory -Force -Path src-tauri/bundled/extensions | Out-Null
            tar -xzf feishu.tar.gz -C src-tauri/bundled/extensions
          }

          Write-Host "== strip nested openclaw links inside plugins (avoid NSIS MAX_PATH) =="
          # 插件里 node_modules/openclaw 指回完整 openclaw，会产生超长路径让 NSIS 失败；
          # 运行时靠 state/node_modules/openclaw 解析，这里安全删掉这些嵌套副本/联接。
          function Kill-Dir($p) {
            if (-not (Test-Path $p)) { return }
            $item = Get-Item $p -Force
            if ($item.Attributes -band [IO.FileAttributes]::ReparsePoint) {
              cmd /c rmdir "$p" | Out-Null
            } else {
              cmd /c rmdir /S /Q "$p" | Out-Null
            }
            Write-Host "removed nested openclaw: $p"
          }
          function Strip-NestedOpenclaw($nm) {
            if (-not (Test-Path $nm)) { return }
            Kill-Dir (Join-Path $nm "openclaw")
            Get-ChildItem $nm -Directory -Filter "@*" -ErrorAction SilentlyContinue | ForEach-Object {
              Get-ChildItem $_.FullName -Directory -ErrorAction SilentlyContinue | ForEach-Object {
                Kill-Dir (Join-Path $_.FullName "node_modules/openclaw")
              }
            }
          }
          if (Test-Path src-tauri/bundled/npm/projects) {
            Get-ChildItem src-tauri/bundled/npm/projects -Directory | ForEach-Object {
              Strip-NestedOpenclaw (Join-Path $_.FullName "node_modules")
            }
          }
          Strip-NestedOpenclaw "src-tauri/bundled/extensions/feishu/node_modules"

          Write-Host "== verify mandatory =="
          if (-not (Test-Path src-tauri/bundled/bin/node.exe)) { throw "node.exe missing" }
          if (-not (Test-Path src-tauri/bundled/lib/node_modules/openclaw/openclaw.mjs)) { throw "openclaw missing" }

          Write-Host "== bundled sizes =="
          function DirMB($p) { if (Test-Path $p) { [math]::Round(((Get-ChildItem -LiteralPath $p -Recurse -File -Force -ErrorAction SilentlyContinue | Measure-Object Length -Sum).Sum/1MB),1) } else { 0 } }
          $ocMB = DirMB "src-tauri/bundled/lib/node_modules/openclaw"
          Write-Host ("bundled total : {0} MB" -f (DirMB "src-tauri/bundled"))
          Write-Host ("  bin/node.exe: {0} MB" -f (DirMB "src-tauri/bundled/bin"))
          Write-Host ("  openclaw    : {0} MB" -f $ocMB)
          Write-Host ("  npm/projects: {0} MB" -f (DirMB "src-tauri/bundled/npm/projects"))
          Write-Host ("  extensions  : {0} MB" -f (DirMB "src-tauri/bundled/extensions"))
          if ($ocMB -lt 100) { throw "bundled openclaw too small ($ocMB MB) — runtime not fully packaged" }

          # 插件命令可能返回非零（如 feishu 版本不符）；这里属预期，强制干净退出。
          $global:LASTEXITCODE = 0
          exit 0
        env:
          GH_TOKEN: ${{ github.token }}


      - name: Build Tauri (NSIS exe)
        run: npm run tauri build -- --bundles nsis

      - name: Report installer size
        if: always()
        shell: pwsh
        run: |
          Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue | ForEach-Object {
            "{0:N1} MB  {1}" -f ($_.Length/1MB), $_.Name
          }

      - name: Smoke test (gateway + plugins + real chat)
        shell: pwsh
        env:
          STEPFUN_API_KEY: ${{ secrets.STEPFUN_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"
          $root = $PWD.Path
          $node = "$root/src-tauri/bundled/bin/node.exe"
          $ocDir = "$root/src-tauri/bundled/lib/node_modules/openclaw"
          $oc = "$ocDir/openclaw.mjs"
          $state = "$root/smoke-state"
          New-Item -ItemType Directory -Force -Path "$state/workspace" | Out-Null

          # 把随包插件放进 state(对标 app 首启动 provision)
          if (Test-Path src-tauri/bundled/npm/projects) {
            New-Item -ItemType Directory -Force -Path "$state/npm/projects" | Out-Null
            Copy-Item -Recurse -Force src-tauri/bundled/npm/projects/* "$state/npm/projects/"
          }
          if (Test-Path src-tauri/bundled/extensions/feishu) {
            New-Item -ItemType Directory -Force -Path "$state/extensions" | Out-Null
            Copy-Item -Recurse -Force src-tauri/bundled/extensions/feishu "$state/extensions/feishu"
          }
          # openclaw 解析联接(对标 fix_bundled_plugin_symlinks)
          New-Item -ItemType Directory -Force -Path "$state/node_modules" | Out-Null
          cmd /c mklink /J "$state\node_modules\openclaw" "$ocDir" | Out-Null

          # 写 openclaw.json(对标 provision)
          $cfg = @{
            gateway = @{ mode="local"; bind="loopback"; auth=@{ mode="none" }; controlUi=@{ dangerouslyDisableDeviceAuth=$true } }
            agents  = @{ defaults=@{ workspace="$state/workspace"; skipBootstrap=$true; model="stepfun/step-3.5-flash" }; list=@(@{ id="dev"; default=$true; workspace="$state/workspace"; model="stepfun/step-3.5-flash" }) }
            models  = @{ providers=@{ stepfun=@{ apiKey=$env:STEPFUN_API_KEY; baseUrl="https://api.stepfun.com/v1" } } }
            plugins = @{ entries=@{ stepfun=@{ enabled=$true }; "openclaw-weixin"=@{ enabled=$true }; feishu=@{ enabled=$true } } }
            tools   = @{ web=@{ search=@{ enabled=$true; provider="duckduckgo" } } }
          }
          $cfg | ConvertTo-Json -Depth 12 | Set-Content -Encoding utf8 "$state/openclaw.json"

          # 启动网关(后台)
          $env:OPENCLAW_STATE_DIR = $state
          $log = "$root/smoke-gw.out.log"
          $errlog = "$root/smoke-gw.err.log"
          $p = Start-Process -FilePath $node -ArgumentList @($oc,"gateway","run","--port","18930","--allow-unconfigured","--auth","none","--bind","loopback") -RedirectStandardOutput $log -RedirectStandardError $errlog -PassThru -NoNewWindow

          # 等 health
          $ok = $false
          for ($i=0; $i -lt 40; $i++) {
            try { $r = Invoke-WebRequest -UseBasicParsing -TimeoutSec 4 http://127.0.0.1:18930/health; if ($r.StatusCode -eq 200) { $ok = $true; break } } catch {}
            Start-Sleep 3
          }
          Write-Host "== gateway health ok: $ok =="
          Write-Host "== loaded plugins line =="
          (Get-Content $log,$errlog -ErrorAction SilentlyContinue | Select-String "plugins:") | Select-Object -Last 1

          # 真实对话测试
          $env:OC_DIR = $ocDir
          $env:GW_URL = "ws://127.0.0.1:18930"
          & $node scripts/ci-smoke.mjs
          $code = $LASTEXITCODE

          Write-Host "== gateway out tail =="; Get-Content $log -Tail 30 -ErrorAction SilentlyContinue
          Write-Host "== gateway err tail =="; Get-Content $errlog -Tail 20 -ErrorAction SilentlyContinue
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue

          if (-not $ok) { throw "gateway health failed" }
          if ($code -ne 0) { throw "chat smoke test failed (exit $code)" }
          Write-Host "SMOKE OK"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: clawbuddy-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
